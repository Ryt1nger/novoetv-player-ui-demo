<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <meta http-equiv="refresh" content="0;url=index.html?screen=sepg">
  <script>location.replace('index.html' + (location.search || '?screen=sepg'));</script>
  <title>Mini-EPG</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/player.css">
  <style>
    #dev-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
      background: rgba(0,0,0,.92); border-top: 1px solid #333;
      padding: 8px 12px; font: 12px/1.4 system-ui, sans-serif;
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    }
    #dev-panel button { cursor: pointer; padding: 3px 8px; font-size: 11px; }
    #dev-panel button.active { background: #18bbcc; color: #111; border-color: #18bbcc; }
    #dev-panel label { color: #888; font-size: 11px; }
    html.audit-mode #dev-panel { display: none; }
    html.audit-mode.browser-preview #tv-viewport { bottom: 0; }
    #sepg-screen { background: #000; }
  </style>
  <script>
    document.documentElement.classList.add('browser-preview');
    if (new URLSearchParams(location.search).has('audit')) {
      document.documentElement.classList.add('audit-mode');
    }
  </script>
</head>
<body class="tizen_tv dev-mode">

  <div id="tv-viewport">
  <div id="tv-stage">
    <div id="sepg-screen" class="screen">
      <div id="playing-error-bar-sepg" class="playing-error-bar screen_pad preview-hidden"></div>

      <div id="sepg-block-title"></div>
      <div id="sepg-container">
        <div class="left bottom sepg-arrow"><img id="sepg-left-arrow" src="img/nav_left.png" alt=""></div>
        <ul id="sepg-menu-list" class="bottom">
          <li id="sepg-channel-0"></li>
          <li id="sepg-channel-1"></li>
          <li id="sepg-channel-2"></li>
        </ul>
        <div class="right bottom sepg-arrow"><img id="sepg-right-arrow" src="img/nav_right.png" alt=""></div>
      </div>

      <div id="sepg-container-loading" class="preview-hidden">
        <div class="left bottom sepg-arrow"><img src="img/nav_left.png" alt=""></div>
        <ul class="bottom">
          <li><div class="loading"><img src="img/loading_data.gif" width="30" alt=""></div></li>
          <li><div class="loading"><img src="img/loading_data.gif" width="30" alt=""></div></li>
          <li><div class="loading"><img src="img/loading_data.gif" width="30" alt=""></div></li>
        </ul>
        <div class="right bottom sepg-arrow"><img src="img/nav_right.png" alt=""></div>
      </div>
    </div>
  </div>
  </div>

  <div id="dev-panel">
    <label>Mini-EPG:</label>
    <button data-state="demo" class="active">3 карточки</button>
    <button data-state="loading">Loading</button>
    <button data-state="empty">Empty</button>
    <button data-state="error">Stream error</button>
    <label>|</label>
    <button data-nav="left">◀ prev</button>
    <button data-nav="right">next ▶</button>
  </div>

  <script src="../js/sepg-ui.js"></script>
  <script>
    var STATES = {
      demo: function () { SepgUI.applyDemo(); },
      loading: function () { SepgUI.applyLoadingDemo(); },
      empty: function () { SepgUI.applyEmptyDemo(); },
      error: function () { SepgUI.applyStreamErrorDemo(); }
    };

    function fitPreviewScale() {
      var devH = document.documentElement.classList.contains('audit-mode') ? 0 : 44;
      var scale = Math.min(window.innerWidth / 1920, (window.innerHeight - devH) / 1080);
      document.documentElement.style.setProperty('--preview-scale', String(scale));
    }

    document.getElementById('dev-panel').addEventListener('click', function (e) {
      var stateBtn = e.target.closest('[data-state]');
      if (stateBtn && STATES[stateBtn.getAttribute('data-state')]) {
        STATES[stateBtn.getAttribute('data-state')]();
        document.querySelectorAll('[data-state]').forEach(function (b) {
          b.classList.toggle('active', b === stateBtn);
        });
      }
      if (e.target.closest('[data-nav="left"]')) SepgUI.shiftLeft();
      if (e.target.closest('[data-nav="right"]')) SepgUI.shiftRight();
    });

    window.addEventListener('resize', fitPreviewScale);
    window.addEventListener('load', function () {
      fitPreviewScale();
      SepgUI.applyDemo();
    });
  </script>
</body>
</html>
