<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <meta http-equiv="refresh" content="0;url=index.html?screen=epg">
  <script>location.replace('index.html' + (location.search || '?screen=epg'));</script>
  <title>Full EPG</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/player.css">
  <style>
    #dev-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
      background: rgba(0,0,0,.92); border-top: 1px solid #333;
      padding: 8px 12px; font: 12px/1.4 system-ui, sans-serif;
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    }
    #dev-panel button { cursor: pointer; padding: 3px 8px; font-size: 11px; }
    #dev-panel button.active { background: #18bbcc; color: #111; border-color: #18bbcc; }
    #dev-panel label { color: #888; font-size: 11px; }
    html.audit-mode #dev-panel { display: none; }
    html.audit-mode.browser-preview #tv-viewport { bottom: 0; }
  </style>
  <script>
    document.documentElement.classList.add('browser-preview');
    if (new URLSearchParams(location.search).has('audit')) {
      document.documentElement.classList.add('audit-mode');
    }
  </script>
</head>
<body class="tizen_tv dev-mode">

  <div id="tv-viewport">
  <div id="tv-stage">
    <div id="epg-screen" class="screen">
      <div class="screen-header">
        <div class="header-logo"><img src="../../mocks/company-logo-novoetv.png" alt="NOVOE TV"></div>
        <div class="header-time"></div>
        <div class="header-date"></div>
      </div>

      <div class="screen-content epg-headers">
        <div class="header" id="epg-category"></div>
        <div class="header" id="epg-channel-name"></div>
        <div class="header" id="epg-channel-description"></div>
      </div>

      <div class="screen-content">
        <div class="list days">
          <ul id="epg-days-list">
            <li id="epgday0"></li>
          </ul>
        </div>

        <div class="list epg">
          <div id="epg-data-loading" class="data-loading preview-hidden"><img src="img/loading_data.gif" alt=""></div>
          <div id="no-epg-message" class="no-content preview-hidden"></div>
          <ul id="epg-list">
            <li id="epg0"></li>
          </ul>
        </div>

        <div class="list program-details">
          <div id="program-data-loading" class="data-loading preview-hidden"><img src="img/loading_data.gif" alt=""></div>
          <div id="program-data"></div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <div id="dev-panel">
    <label>Full EPG:</label>
    <button data-state="demo" class="active">Normal</button>
    <button data-state="loading">Loading</button>
    <button data-state="empty">Empty</button>
    <label>| Фокус:</label>
    <button data-focus="days">Дни</button>
    <button data-focus="programs" class="active">Программы</button>
    <label>|</label>
    <button data-nav="up">▲</button>
    <button data-nav="down">▼</button>
  </div>

  <script src="../js/epg-ui.js"></script>
  <script>
    var STATES = {
      demo: function () { EpgUI.applyDemo(); },
      loading: function () { EpgUI.applyLoadingDemo(); },
      empty: function () { EpgUI.applyEmptyDemo(); }
    };

    function fitPreviewScale() {
      var devH = document.documentElement.classList.contains('audit-mode') ? 0 : 44;
      var scale = Math.min(window.innerWidth / 1920, (window.innerHeight - devH) / 1080);
      document.documentElement.style.setProperty('--preview-scale', String(scale));
    }

    function setActiveState(btn) {
      document.querySelectorAll('[data-state]').forEach(function (b) {
        b.classList.toggle('active', b === btn);
      });
    }

    document.getElementById('dev-panel').addEventListener('click', function (e) {
      var stateBtn = e.target.closest('[data-state]');
      if (stateBtn && STATES[stateBtn.getAttribute('data-state')]) {
        STATES[stateBtn.getAttribute('data-state')]();
        setActiveState(stateBtn);
      }
      var focusBtn = e.target.closest('[data-focus]');
      if (focusBtn) {
        EpgUI.setFocusedColumn(focusBtn.getAttribute('data-focus'));
        document.querySelectorAll('[data-focus]').forEach(function (b) {
          b.classList.toggle('active', b === focusBtn);
        });
      }
      if (e.target.closest('[data-nav="up"]')) EpgUI.shiftSelection(-1);
      if (e.target.closest('[data-nav="down"]')) EpgUI.shiftSelection(1);
    });

    window.addEventListener('resize', fitPreviewScale);
    window.addEventListener('load', function () {
      fitPreviewScale();
      fetch('../../mocks/player-mock.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          window.__EPG_MOCK__ = data.epg;
          EpgUI.applyDemo();
        })
        .catch(function () { EpgUI.applyDemoFallback(); });
    });
  </script>
</body>
</html>
