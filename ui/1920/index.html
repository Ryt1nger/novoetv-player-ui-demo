<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>NovoeTV Player UI</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/player.css">
  <link rel="stylesheet" href="css/player-v4.css">
  <link rel="stylesheet" href="css/iptv-v4.css">
  <style>
    #mock-video-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #000 url('../../assets/img/back.jpg') center/cover no-repeat;
    }
    #preview-dim-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    #preview-dim-overlay.preview-active {
      visibility: visible;
    }
    #preview-dim-overlay.dim-sepg {
      opacity: 1;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.82) 0%,
        rgba(0, 0, 0, 0.45) 38%,
        rgba(0, 0, 0, 0.12) 100%
      );
    }
    #preview-dim-overlay.dim-epg {
      opacity: 1;
      background: rgba(0, 0, 0, 0.68);
      backdrop-filter: blur(2px);
    }
    #player-screen { z-index: 10; background: transparent; }
    #controller-recycler { z-index: 20; }
    #iptv-guide { z-index: 30; }
    #loading-bar, #aspect-bar { z-index: 15; }
    #playing-error-bar-sepg { z-index: 25; left: 50%; top: 30%; transform: translateX(-50%); width: auto; max-width: 900px; }

    #dev-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
      background: rgba(0,0,0,.92); border-top: 1px solid #333;
      padding: 8px 12px; font: 12px/1.4 system-ui, sans-serif;
    }
    .dev-panel-row {
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
      margin-bottom: 4px;
    }
    .dev-panel-row:last-child { margin-bottom: 0; }
    #dev-panel button { cursor: pointer; padding: 3px 8px; font-size: 11px; }
    #dev-panel button.active { background: #18bbcc; color: #111; border-color: #18bbcc; }
    #dev-panel label { color: #888; font-size: 11px; }
    html.audit-mode #dev-panel { display: none; }
    html.audit-mode.browser-preview #tv-viewport { bottom: 0; }
    html.audit-mode #preview-dim-overlay { transition: none; }
  </style>
  <script>
    document.documentElement.classList.add('browser-preview');
    if (new URLSearchParams(location.search).has('audit')) {
      document.documentElement.classList.add('audit-mode');
    }
  </script>
</head>
<body class="tizen_tv dev-mode">

  <div id="tv-viewport">
  <div id="tv-stage">
    <div id="mock-video-bg"></div>
    <div id="preview-dim-overlay" aria-hidden="true"></div>

    <div id="aspect-bar" class="screen_pad preview-hidden"></div>
    <div id="loading-bar" class="preview-hidden">
      <img src="img/spinner.gif" width="102" height="102" alt="">
    </div>

    <div id="player-screen" class="screen">
      <div id="playing-error-bar" class="playing-error-bar screen_pad preview-hidden"></div>

      <div id="player-controller" class="preview-hidden">
        <div id="controller-gradient" aria-hidden="true"></div>
        <div id="controller-logo-badge">
          <img id="controller-logo" src="../../assets/v4/img_logo_player.png" alt="NOVOE TV">
        </div>
        <div id="controller-panel">
          <div id="controller-seek-block">
            <div id="controller-center-title" class="preview-hidden"></div>
            <div class="controller-seek-row">
              <span id="infobar-program-time" class="seek-time">--:--</span>
              <div id="infobar-progress-info">
                <div id="infobar-program-total"></div>
                <div id="infobar-program-progress"></div>
                <div id="infobar-program-pin"></div>
              </div>
              <span id="infobar-program-duration" class="seek-time">--:--</span>
            </div>
          </div>
          <div id="controller-meta-row">
            <div class="controller-meta-left">
              <img id="player-channel-icon" src="../../assets/v4/img_default_channel.png" alt="">
              <div class="controller-text-block">
                <div id="infobar-channel-name"></div>
                <div id="infobar-program-name"></div>
                <div id="program-tag" class="preview-hidden"></div>
              </div>
            </div>
            <div id="controller-actions"></div>
          </div>
        </div>
        <div id="controller-footer">
          <div class="footer-hint">
            <svg class="footer-hint-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#fff" d="M15 18l-6-6 6-6v12z"/></svg>
            <span>Просмотр</span>
          </div>
          <span id="footer-clock"></span>
        </div>
      </div>

      <div id="controller-recycler" class="preview-hidden">
        <ul id="controller-list"></ul>
      </div>
      <div id="playing-error-bar-sepg" class="playing-error-bar screen_pad preview-hidden"></div>
    </div>

    <div id="iptv-guide" class="preview-hidden">
      <div class="iptv-back-pane">
        <button type="button" class="iptv-back-btn" id="iptv-back" aria-label="Назад">←</button>
      </div>
      <aside class="iptv-date-pane">
        <div class="iptv-date-header">
          <img id="iptv-header-logo" src="../../assets/v4/img_default_channel.png" alt="">
          <span id="iptv-header-channel">NTV</span>
        </div>
        <ul id="iptv-date-list"></ul>
      </aside>
      <section class="iptv-channel-pane">
        <div class="iptv-channel-header"><span>Каналы</span></div>
        <ul id="iptv-channel-list"></ul>
      </section>
      <section class="iptv-program-pane">
        <div class="iptv-channel-header"><span>Программа</span></div>
        <div id="iptv-program-loading" class="preview-hidden">Загрузка…</div>
        <div id="iptv-program-empty" class="preview-hidden">Программа на выбранный день недоступна!</div>
        <ul id="iptv-program-list"></ul>
      </section>
      <aside class="iptv-detail-pane">
        <img id="iptv-detail-poster" src="../../mocks/channel-poster-ntv.png" alt="">
        <div class="iptv-detail-actions">
          <button type="button" id="iptv-detail-stream">Смотреть</button>
          <button type="button" class="focus-switch" id="iptv-detail-watch" data-action="watch">
            <span class="focus-switch-icon"><svg viewBox="0 0 24 24"><path fill="#fff" d="M12 4C7 4 2.7 7.1 1 12c1.7 4.9 6 8 11 8s9.3-3.1 11-8c-1.7-4.9-6-8-11-8zm0 13c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5z"/></svg></span>
            <span class="focus-switch-label">Буду смотреть</span>
          </button>
        </div>
        <div id="iptv-detail-time"></div>
        <h1 id="iptv-detail-title"></h1>
        <p id="iptv-detail-description"></p>
        <span id="iptv-detail-rating"></span>
      </aside>
    </div>

  </div>
  </div>

  <div id="dev-panel">
    <div class="dev-panel-row">
      <label>Экран:</label>
      <button type="button" data-screen-tab="player" class="active">Player</button>
      <button type="button" data-screen-tab="sepg">Mini list</button>
      <button type="button" data-screen-tab="epg">IPTV Guide</button>
    </div>

    <div class="dev-panel-row" data-panel="player">
      <label>Player:</label>
      <button type="button" data-player-state="live">Live+load</button>
      <button type="button" data-player-state="playing" class="active">Playing</button>
      <button type="button" data-player-state="paused">Paused</button>
      <button type="button" data-player-state="loading">Loading</button>
      <button type="button" data-player-state="error">Error</button>
      <button type="button" data-player-state="archive">Archive</button>
      <button type="button" data-player-state="fav">Fav ✓</button>
      <label>| Focus:</label>
      <button type="button" data-action-focus="program">Программа</button>
      <button type="button" data-action-focus="watch" class="active">Смотреть</button>
      <button type="button" data-action-focus="favorite">♥</button>
      <input type="range" id="progress-slider" min="0" max="100" value="50" style="width:90px" title="Прогресс">
    </div>

    <div class="dev-panel-row preview-hidden" data-panel="sepg">
      <label>Mini list:</label>
      <button type="button" data-sepg-state="demo" class="active">Программы</button>
      <button type="button" data-sepg-state="loading">Loading</button>
      <button type="button" data-sepg-state="empty">Empty</button>
      <button type="button" data-sepg-state="error">Stream error</button>
      <button type="button" data-action="sepg-left">▲</button>
      <button type="button" data-action="sepg-right">▼</button>
    </div>

    <div class="dev-panel-row preview-hidden" data-panel="epg">
      <label>Guide:</label>
      <button type="button" data-epg-state="demo" class="active">Normal</button>
      <button type="button" data-epg-state="loading">Loading</button>
      <button type="button" data-epg-state="empty">Empty</button>
      <label>|</label>
      <button type="button" data-epg-focus="days">даты</button>
      <button type="button" data-epg-focus="channels">каналы</button>
      <button type="button" data-epg-focus="programs" class="active">программы</button>
      <button type="button" data-epg-focus="detail">detail</button>
      <button type="button" data-action="epg-up">▲</button>
      <button type="button" data-action="epg-down">▼</button>
    </div>
  </div>

  <script src="../js/player-ui.js"></script>
  <script src="../js/sepg-ui.js"></script>
  <script src="../js/epg-ui.js"></script>
  <script src="../js/app-preview.js"></script>
  <script>
    window.addEventListener('load', function () {
      AppPreview.init();
    });
  </script>
</body>
</html>
