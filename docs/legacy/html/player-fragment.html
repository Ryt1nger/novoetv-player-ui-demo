        <div id="player-screen" class="screen key-handler" x-key-handler="info" style="display: none;" _onmousemove="App.display.getCurrentScreen().showSepg()">
            <div id="playing-error-bar" class="playing-error-bar screen_pad" style="display:none;"></div>

            <div id="tv-infobar" style="display:none;">
                <div id="player-company-logo" onclick="App.playerScreen.key_menu()">
                    <img id="player-company-logo-img" src="img/company-logo.png" />
                </div>

                <div id="block-tv-info">
                    <div id="navigation-splitter"></div>
                    <div id="navigation-panel">
                        <ul id="navigation-list">
                            <li id="nav0"><div class="tvchannels"></div></li>
                        </ul>
                    </div>
                    <div id="infobar-common-info">
                        <div id="infobar-channel-icon">
                            <img id="player-channel-icon" src="no_logo.gif" />
                        </div>
                        <div id="infobar-channel-number"></div>
                        <div id="infobar-channel-name"></div>
                        <div id="infobar-program-name"></div>
                        <div id="infobar-program-time"></div>

                        <div id="infobar-progress-info">
                            <div id="infobar-program-total"></div>
                            <div id="infobar-program-progress"></div>
                            <div id="infobar-program-pin"></div>
                        </div>

                        <div id="infobar-program-duration"></div>
                    </div>
                </div>
            </div>

            <div id="tv-fwdbar">
                <div id="infobar-common-fwd">
                    <div id="infobar-program-name-fwd"></div>
                    <div id="infobar-program-time-fwd"></div>

                    <div id="infobar-progress-fwd">
                        <div id="infobar-program-total-fwd"></div>
                        <div id="infobar-program-progress-fwd"></div>
                        <div id="infobar-program-pin-fwd"></div>
                    </div>

                    <div id="infobar-program-duration-fwd"></div>
                </div>
            </div>

        </div>
        <div id="epg-screen" class="screen" style="display:none;">
            <div class="screen-header">
                <div class="header-logo key-handler" x-key-handler="menu"><img src="img/company-logo.png" /></div>
                <div class="header-time"></div>
                <div class="header-date"></div>
            </div>

            <div class="screen-content">
                <div class="header" id="epg-category"></div>
                <div class="header" id="epg-channel-name"></div>
                <div class="header" id="epg-channel-description"></div>
            </div>

            <div class="screen-content">
                <div class="list days">
                    <ul id="epg-days-list">
                        <li id="epgday0"></li>
                    </ul>
                </div>

                <div class="list epg">
                    <div id="epg-data-loading" class="data-loading"><img src="img/loading_data.gif"></div>
                    <div id="no-epg-message" class="no-content"></div>
                    <ul id="epg-list">
                        <li id="epg0"></li>
                    </ul>
                </div>

                <div class="list program-details">
                    <div id="program-data-loading" class="data-loading"><img src="img/loading_data.gif"></div>
                    <div id="program-data"></div>
                </div>
            </div>
        <div id="sepg-screen" class="screen" style="display:none;">
            <div id="playing-error-bar-sepg" class="playing-error-bar screen_pad" style="display:none;"></div>

            <div id="sepg-block-title"></div>
            <div id="sepg-container">
                <div class="left bottom sepg-arrow"><img id="sepg-left-arrow" src="img/nav_left.png"></div>
                <ul id="sepg-menu-list" class="bottom">
                    <li id="sepg-channel-0"></li>
                    <li id="sepg-channel-1"></li>
                    <li id="sepg-channel-2"></li>
                </ul>
                <div class="right bottom sepg-arrow"><img id="sepg-right-arrow" src="img/nav_right.png"></div>
            </div>
        </div>
